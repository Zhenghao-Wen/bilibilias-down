name: Build and Upload Compose APK (Alpha)

on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ===================== 拉取源代码 =====================
      - name: Checkout source from 1250422131/bilibilias
        uses: actions/checkout@v4
        with:
          repository: 1250422131/bilibilias
          ref: main

      # ===================== 环境准备 =====================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      # 使用官方最新的 v4 Gradle Action
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      # ===================== 签名相关 =====================
      - name: Decode signing keystore
        run: |
          printf '%s' "${{ secrets.ALPHA_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/mxjs-debug.jks

      - name: Verify keystore
        run: |
          echo "=== Keystore Verification ==="
          keytool -list -keystore $RUNNER_TEMP/mxjs-debug.jks \
            -storepass "${{ secrets.ALPHA_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ALPHA_KEY_ALIAS }}" || {
            echo "❌ Failed to read keystore"
            exit 1
          }
          echo "✅ Keystore verified"

      - name: Export secrets to environment
        run: |
          echo "ALPHA_KEYSTORE_PASSWORD=${{ secrets.ALPHA_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ALPHA_KEY_ALIAS=${{ secrets.ALPHA_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ALPHA_KEY_PASSWORD=${{ secrets.ALPHA_KEY_PASSWORD }}" >> $GITHUB_ENV
          # 将加密密码写入环境变量，避免特殊字符导致 Shell 解析崩溃
          echo "ENCRYPT_CODE=${{ secrets.ENCRYPT_CODE }}" >> $GITHUB_ENV

      # ===================== 构建 =====================
      - name: Assemble alphaRelease
        run: ./gradlew :app:assembleAlphaRelease --stacktrace --info

      - name: List outputs (debug)
        run: |
          echo "=== Outputs under app/build/outputs/apk/alpha/release ==="
          ls -lh app/build/outputs/apk/alpha/release/ || true
          echo ""
          echo "=== All APK files ==="
          find app/build/outputs/apk -name "*.apk" -type f || true

      # ===================== 环境稳健性检查 =====================
      - name: Ensure p7zip-full is installed
        run: |
          if ! command -v 7z &> /dev/null; then
            echo "7z not found, installing p7zip-full..."
            sudo apt-get update && sudo apt-get install -y p7zip-full
          else
            echo "7z is already installed."
          fi

      # ===================== 打包加密产物（仅 arm64-v8a）=====================
      - name: Package and encrypt arm64-v8a APK
        run: |
          # 熔断检查：确保 ENCRYPT_CODE 不为空
          if [ -z "$ENCRYPT_CODE" ]; then
            echo "❌ ENCRYPT_CODE secret is empty! Aborting to prevent uploading unencrypted APK."
            exit 1
          fi

          # 定位 arm64-v8a APK
          APK_FILE=$(find app/build/outputs/apk/alpha/release -name "*arm64-v8a*.apk" -type f | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "❌ arm64-v8a APK not found!"
            find app/build/outputs/apk -name "*.apk" -type f
            exit 1
          fi
          echo "✅ Found APK: $APK_FILE"

          # 使用 7z 创建 AES-256 加密压缩包（-mhe=on 加密文件名）
          OUTPUT_ZIP="bilibilias-alpha-arm64-v8a-encrypted.7z"
          
          # 通过环境变量 $ENCRYPT_CODE 传参，GitHub 会自动 Mask 日志中的敏感值
          7z a -p"$ENCRYPT_CODE" -mhe=on -t7z "$OUTPUT_ZIP" "$APK_FILE"

          echo "✅ Encrypted archive created: $OUTPUT_ZIP"
          ls -lh "$OUTPUT_ZIP"

          # 保存文件名供后续步骤使用
          echo "ENCRYPTED_ZIP=$OUTPUT_ZIP" >> $GITHUB_ENV

      # ===================== 上传加密产物 =====================
      - name: Upload encrypted arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: bilibilias-alpha-arm64-v8a-encrypted
          path: ${{ env.ENCRYPTED_ZIP }}
          if-no-files-found: error
          retention-days: 30
