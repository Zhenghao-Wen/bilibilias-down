name: Build and Upload Compose APK (Alpha)

# 仅手动触发（需要自动构建时可取消 push/pr 的注释）
on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]
  # pull_request:
  #   branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ===================== 拉取源代码 =====================
      - name: Checkout source from 1250422131/bilibilias
        uses: actions/checkout@v4
        with:
          repository: 1250422131/bilibilias
          ref: main                     # 源仓库主分支

      # ===================== 环境准备 =====================
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Clean
        run: ./gradlew clean

      # ===================== 签名相关 =====================
      - name: Decode signing keystore
        run: |
          printf '%s' "${{ secrets.ALPHA_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/mxjs-debug.jks

      - name: Verify keystore
        run: |
          echo "=== Keystore Verification ==="
          keytool -list -keystore $RUNNER_TEMP/mxjs-debug.jks \
            -storepass "${{ secrets.ALPHA_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ALPHA_KEY_ALIAS }}" || {
            echo "❌ Failed to read keystore"
            exit 1
          }
          echo "✅ Keystore verified"

      - name: Export signing secrets to environment
        run: |
          echo "ALPHA_KEYSTORE_PASSWORD=${{ secrets.ALPHA_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "ALPHA_KEY_ALIAS=${{ secrets.ALPHA_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "ALPHA_KEY_PASSWORD=${{ secrets.ALPHA_KEY_PASSWORD }}" >> $GITHUB_ENV

      # ===================== 构建 =====================
      - name: Assemble alphaRelease
        run: ./gradlew :app:assembleAlphaRelease --stacktrace --info

      - name: List outputs (debug)
        run: |
          echo "=== Outputs under app/build/outputs/apk/alpha/release ==="
          ls -lh app/build/outputs/apk/alpha/release/ || true
          echo ""
          echo "=== All APK files ==="
          find app/build/outputs/apk -name "*.apk" -type f || true

      # ===================== 上传产物 =====================
      - name: Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-alpha-universal
          path: app/build/outputs/apk/alpha/release/*universal*.apk
          if-no-files-found: error

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-alpha-arm64-v8a
          path: app/build/outputs/apk/alpha/release/*arm64-v8a*.apk
          if-no-files-found: error

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-alpha-armeabi-v7a
          path: app/build/outputs/apk/alpha/release/*armeabi-v7a*.apk
          if-no-files-found: error

      - name: Upload x86_64 APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-alpha-x86_64
          path: app/build/outputs/apk/alpha/release/*x86_64*.apk
          if-no-files-found: error